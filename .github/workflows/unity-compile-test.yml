name: unity-compile-test

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unity Cache
      uses: AndanteTribe/Actions/actions/unity-cache@main
      with:
        unity-project-path: src/Utils.Unity
        use-nugetforunity: true
        nuget-packages-path: src/Utils.Unity/Packages/nuget-packages

    - uses: game-ci/unity-test-runner@v4
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      with:
        projectPath: src/Utils.Unity
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        unityVersion: auto
        testMode: editmode
