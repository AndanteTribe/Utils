name: unity-compile-test

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Unity in Docker
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      run: |
        # Extract serial from license file (same method used by game-ci/unity-test-runner internally)
        UNITY_SERIAL=$(echo "$UNITY_LICENSE" | \
          grep -oP '(?<=<DeveloperData Value=")[^"]+' | \
          base64 -d | \
          cut -b5-)
        if [[ -z "$UNITY_SERIAL" ]]; then
          echo "::error ::Failed to extract Unity serial from UNITY_LICENSE. Check that UNITY_LICENSE secret is set correctly."
          exit 1
        fi
        mkdir -p /tmp/BlankProject
        docker run --rm \
          -e UNITY_SERIAL \
          -e UNITY_EMAIL \
          -e UNITY_PASSWORD \
          -v "/tmp/BlankProject:/BlankProject" \
          -v "${{ github.workspace }}/src/Utils.Unity:/project" \
          unityci/editor:6000.3.2f1-linux-il2cpp-3.2.1 \
          bash -c 'dbus-uuidgen > /etc/machine-id && \
            mkdir -p /var/lib/dbus && \
            ln -sf /etc/machine-id /var/lib/dbus/machine-id && \
            unity-editor -logFile /dev/stdout -quit \
              -serial "$UNITY_SERIAL" \
              -username "$UNITY_EMAIL" \
              -password "$UNITY_PASSWORD" \
              -projectPath /BlankProject && \
            unity-editor -batchmode -quit -projectPath /project -logFile /dev/stdout'
